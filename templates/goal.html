<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goal Planner | FinanceIQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .navbar {
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: #4ade80; font-size: 22px; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 20px; font-size: 14px; }
        .nav-links .logout { background: rgba(239,68,68,0.2); padding: 6px 14px; border-radius: 8px; color: #fca5a5; }
        .container { padding: 30px; max-width: 600px; margin: 0 auto; }
        .page-title { font-size: 24px; color: #4ade80; margin-bottom: 25px; font-weight: 700; }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 30px;
        }
        .form-group { margin-bottom: 20px; }
        label { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 8px; display: block; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: #4ade80; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); }
        .hint { color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>💰 FinanceIQ</h1>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/add_data">Add Data</a>
            <a href="/goal">Goal Planner</a>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-title">🎯 Future Savings Planner</div>

        <div class="card">
            <form method="POST" action="/goal">
                <div class="form-group">
                    <label>What do you want to save for?</label>
                    <input type="text" name="goal_name" placeholder="e.g. New Bike, Laptop, Emergency Fund" required>
                </div>
                <div class="form-group">
                    <label>Total Amount Needed (₹)</label>
                    <input type="number" name="goal_amount" placeholder="e.g. 100000" required min="1">
                </div>
                <div class="form-group">
                    <label>In how many months?</label>
                    <input type="number" name="goal_months" placeholder="e.g. 12" required min="1">
                </div>
                <div class="form-group">
                    <label>Your Monthly Income (₹)</label>
                    <input type="number" name="income" placeholder="e.g. 50000" required min="1">
                </div>
                <div class="form-group">
                    <label>Your Current Monthly Savings (₹)</label>
                    <input type="number" name="savings" placeholder="e.g. 10000" required min="0">
                    <div class="hint">How much do you save each month after expenses?</div>
                </div>
                <div class="form-group">
                    <label>Your Monthly Variable Expenses (₹)</label>
                    <input type="number" name="variable_total" placeholder="e.g. 15000" required min="0">
                    <div class="hint">Shopping, entertainment, food orders etc.</div>
                </div>
                <button type="submit" class="btn-submit">🔍 Analyze My Goal →</button>
            </form>
        </div>
    </div>
</body>
</html>
