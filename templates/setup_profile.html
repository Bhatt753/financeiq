<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile | FinanceIQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            text-align: center;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
            border: 3px solid #4ade80;
        }
        .avatar-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #4ade80;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 15px;
        }
        h2 { color: #4ade80; font-size: 22px; margin-bottom: 8px; }
        p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 25px; }
        label { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 8px; display: block; text-align: left; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            margin-bottom: 20px;
        }
        input:focus { border-color: #4ade80; }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        {% if session.avatar %}
        <img src="{{ session.avatar }}" class="avatar" alt="Profile">
        {% else %}
        <div class="avatar-placeholder">👤</div>
        {% endif %}

        <h2>Welcome, {{ session.name }}! 👋</h2>
        <p>One last thing — what is your profession?</p>

        <form method="POST">
            <label>Your Profession</label>
            <input type="text" name="profession"
                   placeholder="e.g. Student, Engineer, Doctor" required>
            <button type="submit" class="btn">Get Started →</button>
        </form>
    </div>
</body>
</html>
